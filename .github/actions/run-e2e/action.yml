name: "Run E2E Tests"
description: "Runs VS Code End-to-End Tests for the Colab extension"

runs:
  using: "composite"
  steps:
    - name: Use Node.js ${{ env.NODE_VERSION }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: "npm"
    - run: npm ci
      shell: bash
    - name: Download generated config
      uses: actions/download-artifact@v4
      with:
        name: generated-config
        path: src
    # Tp run e2e test with real secrets
    - name: Generate config with real secrets
      run: npm run generate:config
      shell: bash
    - name: npm run test:e2e:headless (Linux)
      if: runner.os == 'Linux'
      run: npm run test:e2e:headless
      shell: bash
      env:
        SCREENSHOTS_DIR: /tmp/test-resources/screenshots/
    - name: npm run test:e2e
      if: runner.os != 'Linux'
      run: npm run test:e2e
      shell: bash
      env:
        SCREENSHOTS_DIR: /tmp/test-resources/screenshots/
    - name: upload screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: screenshots
        path: /tmp/test-resources/screenshots/
    - name: upload exthost.log
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: exthost log
        path: /tmp/test-resources/settings/logs/*/window1/exthost/exthost.log
