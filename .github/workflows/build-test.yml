# For PRs.

name: Build and Test

on:
  workflow_call:
    secrets:
      TEST_ACCOUNT_EMAIL:
        required: true
      TEST_ACCOUNT_PASSWORD:
        required: true
      WORKBENCH_EXTENSION_CLIENT_ID:
        required: true
      WORKBENCH_EXTENSION_CLIENT_NOT_SO_SECRET:
        required: true
  workflow_dispatch:

env:
  # See supported Node.js release schedule at https://nodejs.org/en/about/releases
  NODE_VERSION: 22.x
  TEST_ACCOUNT_EMAIL: ${{ secrets.TEST_ACCOUNT_EMAIL }}
  TEST_ACCOUNT_PASSWORD: ${{ secrets.TEST_ACCOUNT_PASSWORD }}

# All jobs only need read access to the repository contents.
permissions:
  contents: read

jobs:
  generateConfig:
    name: Generate Config
    runs-on: ubuntu-latest
    environment: Workbench
    env:
      WORKBENCH_EXTENSION_CLIENT_ID: client_id
      WORKBENCH_EXTENSION_CLIENT_NOT_SO_SECRET: client_secret
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npm run generate:config
      - name: Upload generated config
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: generated-config
          path: src/config.ts
          if-no-files-found: error

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: generateConfig
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - name: Download generated config
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: generated-config
          path: src
      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck
      # While spell check runs in lint, here we run it as a separate step to
      # make it easier to see the results and treat violations as errors
      # instead of warnings.
      - name: Spell Check
        run: npx cspell "**" --no-progress --show-suggestions --show-context

  workflowSecurity:
    name: Workflow Security (zizmor)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Run zizmor
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          # Audit only the workflow definitions in this repository.
          inputs: ./.github/workflows
          advanced-security: false
          annotations: true

  unitTests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: generateConfig
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - name: Download generated config
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: generated-config
          path: src
      - run: npm run test:unit

  vsCodeTests:
    name: VS Code Integration Tests
    strategy:
      matrix:
        # macos-latest and windows-latest can be added as we work towards a release.
        # For now, there's no sense acruing the cost of the runners.
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    needs: generateConfig
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - name: Download generated config
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: generated-config
          path: src
      - name: npm run test:integration:headless (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npm run test:integration:headless
      - name: npm run test:integration
        if: matrix.os != 'ubuntu-latest'
        run: npm run test:integration

  e2eTests:
    name: VS Code E2E Tests
    strategy:
      matrix:
        # macos-latest and windows-latest can be added as we work towards a release.
        # For now, there's no sense acruing the cost of the runners.
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    needs: unitTests
    environment: Workbench
    env:
      # Secrets and variables are sourced from the "E2E Tests" environment.
      TEST_ACCOUNT_EMAIL: ${{ secrets.TEST_ACCOUNT_EMAIL }}
      TEST_ACCOUNT_PASSWORD: ${{ secrets.TEST_ACCOUNT_PASSWORD }}
      WORKBENCH_EXTENSION_CLIENT_ID: ${{ secrets.WORKBENCH_EXTENSION_CLIENT_ID }}
      WORKBENCH_EXTENSION_CLIENT_NOT_SO_SECRET: ${{ secrets.WORKBENCH_EXTENSION_CLIENT_NOT_SO_SECRET }}

    steps:
      - if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Run E2E Tests (Same Repository)
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: ./.github/actions/run-e2e
      - name: Skip E2E Tests (Fork)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo "E2E tests are skipped for PRs originating from forks."
          echo "Forks don't have access to repository secrets, they cannot authenticate with the backend."
          echo "A maintainer should test these changes by pushing the fork's branch to the main repository."
